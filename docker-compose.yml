# Simplified docker-compose — no Redis, no external Postgres
# Uses SQLite stored in ./data volume
# Total infra cost: $0

version: '3.9'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data   # SQLite persisted on host
    restart: unless-stopped
    command: python run.py --api

  bot:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data   # shares same SQLite file
    restart: unless-stopped
    command: python run.py --bot
    depends_on:
      - api
